# Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network - use DHCP (omit if you want static)
d-i netcfg/disable_dhcp boolean false
d-i netcfg/choose_interface select auto

# Hostname & domain
d-i netcfg/get_hostname string computer
d-i netcfg/get_domain string unassigned.domain

# Root and user passwords (root locked; create a user)
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string user
d-i passwd/username string user
d-i passwd/user-password-crypted password $6$0/uL3PZZ8nKKk4zV$mjU4DkMqdL5/xvZoUOBD68.pZ14Ag0S0EMJgzkgEeEVLpkyqXd3h60CNK6ulP2/9CGuAIhdmkhwBVEM2ihuQY.

# Mirror prompt
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Partitioning - simple guided LVM on entire disk (no prompts)
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman/confirm boolean true

# Clock and time zone setup
d-i clock-setup/utc boolean true
d-i time/zone string US/Pacific
d-i clock-setup/ntp boolean true

# Package usage survey
d-i popularity-contest/participate boolean false

# Package selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server linux-headers-amd64 virtualbox-guest-utils virtualbox-guest-dkms

# Late command: update, upgrade, and attempt DKMS builds; allow failures
d-i preseed/late_command string \
  in-target /bin/bash -c "apt-get update && apt-get -y upgrade && dkms autoinstall || true"

# Finish
d-i finish-install/reboot_in_progress note
